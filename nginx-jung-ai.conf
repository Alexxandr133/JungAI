# Конфигурация Nginx для jung-ai.ru
# Скопируйте этот файл в /etc/nginx/sites-available/jung-ai
# И создайте симлинк: ln -s /etc/nginx/sites-available/jung-ai /etc/nginx/sites-enabled/

# Редирект с IP-адреса на домен (HTTP)
server {
    listen 80;
    listen [::]:80;
    server_name 212.193.30.213;
    
    # Редирект на HTTPS домен
    return 301 https://jung-ai.ru$request_uri;
}

# Редирект с IP-адреса на домен (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 212.193.30.213;

    ssl_certificate /etc/letsencrypt/live/jung-ai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jung-ai.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Редирект на HTTPS домен
    return 301 https://jung-ai.ru$request_uri;
}

# Основной блок для домена (HTTP) - редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jung-ai.ru www.jung-ai.ru;

    # Редирект на HTTPS
    return 301 https://jung-ai.ru$request_uri;
}

